<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Simulateur M1 Banana 🍌</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f0f11;
            --card-bg: rgba(24, 24, 27, 0.85); /* Zinc 900 transparent */
            --primary: #FFE135; /* Banana Yellow */
            --primary-dark: #D4B200;
            --secondary: #FFB000;
            --text-main: #f4f4f5; /* Zinc 100 */
            --text-muted: #a1a1aa; /* Zinc 400 */
            --success: #34d399;
            --danger: #fb7185;
            --input-bg: #27272a; /* Zinc 800 */
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #09090b 0%, #18181b 100%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        #particles {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 0;
        }
        .particle {
            position: absolute; font-size: 1.5rem; opacity: 0.6;
            animation: floatUp linear forwards;
            filter: drop-shadow(0 2px 4px rgba(255,225,53,0.2));
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.5) rotate(360deg); opacity: 0; }
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 225, 53, 0.15);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        .cute-input {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #3f3f46;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--text-main);
            background: var(--input-bg);
            outline: none;
            transition: all 0.3s ease;
        }
        .cute-input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(255, 225, 53, 0.2); transform: scale(1.02); }
        .cute-input::placeholder { color: #52525b; }
        
        /* Optimisations pour Mobile */
        @media (max-width: 768px) {
            .cute-input { font-size: 16px !important; } /* Empêche le zoom auto sur iOS */
            /* Cache les flèches haut/bas des inputs number sur mobile pour gagner de la place */
            input[type="number"]::-webkit-inner-spin-button, 
            input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
            input[type="number"] { -moz-appearance: textfield; }
        }

        .grade-input { text-align: center; }

        .btn-banana {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #18181b; border: none; padding: 12px 24px; border-radius: 16px;
            font-weight: 900; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 225, 53, 0.2);
            transition: all 0.2s;
        }
        .btn-banana:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(255, 225, 53, 0.3); }
        .btn-banana:active { transform: translateY(1px); }

        .btn-outline {
            background: transparent; border: 2px solid var(--primary); color: var(--primary);
            padding: 8px 16px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: all 0.2s;
        }
        .btn-outline:hover { background: var(--primary); color: #18181b; }

        .mascot-container { animation: floatMascot 3.5s ease-in-out infinite; filter: drop-shadow(0 10px 15px rgba(255,225,53,0.15)); }
        @keyframes floatMascot {
            0%, 100% { transform: translateY(0px) rotate(-2deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }

        .badge-acquis { background: rgba(52, 211, 153, 0.15); color: #34d399; border: 1px solid #059669; }
        .badge-rattrapage { background: rgba(251, 113, 133, 0.15); color: #fb7185; border: 1px solid #e11d48; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
            padding: 1rem;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--card-bg); padding: 24px; border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); transform: translateY(20px);
            transition: transform 0.3s; text-align: center; max-width: 100%; width: 360px;
            border: 2px solid var(--primary);
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--card-bg); backdrop-filter: blur(10px);
            border: 2px solid var(--primary); padding: 12px 24px; border-radius: 20px;
            font-weight: 800; color: var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 2000; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 10px;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        input[type="number"] { touch-action: manipulation; }

    </style>
</head>

            if (nameInput === "404") {
                state.name = "Siradj";
                state.units = JSON.parse(JSON.stringify(siradjUnits));
                showToast("Easter Egg trouvé ! Bienvenue Boss !");
            } else {
                state.name = nameInput;
                state.units = JSON.parse(JSON.stringify(emptyUnits));
            }
            
            document.getElementById('onboarding').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            
            document.getElementById('dash-greeting').innerHTML = `Marhaba, <span class="text-yellow-400">${state.name}</span> ! 🍌`;
            document.getElementById('dash-duaa').innerText = `Qu'Allah te facilite et t'accorde la réussite, ${state.name} ! N'oublie pas tes prières 🤲✨`;
            
            renderUnits();
        }

        function getModAvg(mod) {
            let finalExam = mod.rattrapage !== null && mod.rattrapage !== "" ? parseFloat(mod.rattrapage) : parseFloat(mod.exam || 0);
            if (mod.cc !== null && mod.cc !== "") {
                return (parseFloat(mod.cc) + finalExam) / 2;
            }
            return finalExam;
        }

        function getUnitStats(unit) {
            let pts = 0, coefs = 0;
            unit.modules.forEach(mod => {
                let c = parseFloat(mod.coef || 0);
                pts += getModAvg(mod) * c;
                coefs += c;
            });
            let avg = coefs > 0 ? (pts / coefs) : 0;
            return { avg, pts, coefs, isAcquired: avg >= 10.0 };
        }

        window.renderUnits = () => {
            const container = document.getElementById('units-container');
            container.innerHTML = '';
            
            let globalPts = 0, globalCoefs = 0;
            let unitStatsList = [];

            state.units.forEach(unit => {
                const uStats = getUnitStats(unit);
                unitStatsList.push(uStats);
                globalPts += uStats.pts;
                globalCoefs += uStats.coefs;
            });

            const globalAvg = globalCoefs > 0 ? (globalPts / globalCoefs) : 0;
            const isYearAcquired = globalAvg >= 10.0;
            const targetGlobalPts = 10.0 * globalCoefs;
            const globalDeficit = targetGlobalPts - globalPts;

            document.getElementById('dash-annual-avg').innerText = globalAvg.toFixed(3);
            if (unitStatsList.length >= 2) {
                document.getElementById('dash-s1-avg').innerText = unitStatsList[0].avg.toFixed(2);
                document.getElementById('dash-s2-avg').innerText = unitStatsList[1].avg.toFixed(2);
            }

            const objText = document.getElementById('dash-objective');
            if (isYearAcquired) {
                objText.innerHTML = "🎉 <span class='text-emerald-400'>Année Validée par compensation ! Félicitations !</span>";
            } else {
                objText.innerHTML = `⚠️ Il manque <strong class='text-red-400'>${globalDeficit.toFixed(2)} points de pondération</strong>.`;
            }

            state.units.forEach((unit, uIdx) => {
                const uStats = unitStatsList[uIdx];
                const isUnitAcquired = uStats.isAcquired || isYearAcquired;

                let unitHtml = `
                    <div class="glass-panel p-4 md:p-6 pb-6">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 md:mb-6 border-b border-zinc-700 pb-3 md:pb-4 gap-3">
                            <div class="flex items-center gap-2 md:gap-4 w-full md:w-auto justify-between md:justify-start">
                                <input type="text" value="${unit.name}" class="text-xl md:text-2xl font-black text-zinc-100 bg-transparent outline-none border-b-2 border-transparent focus:border-yellow-400 w-40 md:w-64" onchange="updateUnitName(${uIdx}, this.value)">
                                <button onclick="deleteUnit(${uIdx})" class="text-zinc-500 hover:text-red-400 font-bold bg-zinc-800/50 px-2 py-1 rounded-md text-xs md:text-sm transition-colors whitespace-nowrap">Supprimer Bloc</button>
                            </div>
                            <div class="flex items-center gap-3 w-full md:w-auto bg-zinc-800/50 p-2 rounded-xl md:bg-transparent md:p-0">
                                <span class="text-xl md:text-2xl font-black ${uStats.isAcquired ? 'text-emerald-400' : 'text-rose-400'} bg-zinc-900 px-3 md:px-4 py-1 rounded-xl shadow-sm border border-zinc-700">${uStats.avg.toFixed(2)}</span>
                                ${isUnitAcquired ? '<span class="px-2 md:px-3 py-1 rounded-full badge-acquis text-[10px] md:text-sm font-bold shadow-sm whitespace-nowrap">✓ ACQUIS</span>' : '<span class="px-2 md:px-3 py-1 rounded-full badge-rattrapage text-[10px] md:text-sm font-bold shadow-sm whitespace-nowrap">⚠ À COMPENSER</span>'}
                            </div>
                        </div>

                        <div class="overflow-x-auto pb-2 w-full">
                            <table class="w-full text-left border-collapse min-w-full md:min-w-[700px]">
                                <thead>
                                    <tr class="text-zinc-400 text-[9px] md:text-sm border-b border-zinc-700 bg-zinc-800/30">
                                        <th class="p-1 md:p-3 rounded-tl-xl">Mod.</th>
                                        <th class="p-1 md:p-3 text-center w-8 md:w-16">Coef</th>
                                        <th class="p-1 md:p-3 text-center w-10 md:w-20">CC</th>
                                        <th class="p-1 md:p-3 text-center w-10 md:w-20">Exam</th>
                                        <th class="p-1 md:p-3 text-center w-14 md:w-36 text-yellow-400 bg-yellow-900/10 leading-tight">Rattrap.🎯</th>
                                        <th class="p-1 md:p-3 text-center w-10 md:w-20">Moy.</th>
                                        <th class="p-1 md:p-3 text-center w-20 md:w-24 rounded-tr-xl hidden md:table-cell">Statut</th>
                                    </tr>
                                </thead>
                                <tbody>
                `;

                unit.modules.forEach((mod, mIdx) => {
                    const modAvg = getModAvg(mod);
                    const isModAcquired = modAvg >= 10.0;
                    
                    // The core requirement: NEVER block the rattrapage input.
                    let rattrapageHtml = `<input type="number" min="0" max="20" step="0.25" value="${mod.rattrapage !== null ? mod.rattrapage : ''}" placeholder="?" class="cute-input grade-input mx-auto border-zinc-600 focus:border-yellow-400 w-12 md:w-20 text-[16px] md:text-sm p-1 md:p-2" onchange="updateGrade(${uIdx}, ${mIdx}, 'rattrapage', this)">`;
                    let estimationHtml = "";
                    
                    let statusHtml = "";
                    if (isYearAcquired || uStats.isAcquired || isModAcquired) {
                        statusHtml = `<span class="text-emerald-400 font-bold text-xs md:text-sm">✓ Validé</span>`;
                    } else {
                        statusHtml = `<span class="text-rose-400 font-bold text-xs md:text-sm">À repasser</span>`;
                    }

                    // Calculate Estimation only if needed
                    if (globalDeficit > 0 && parseFloat(mod.coef) > 0 && !isModAcquired) {
                        const avgIncreaseNeeded = globalDeficit / parseFloat(mod.coef);
                        const targetModAvg = modAvg + avgIncreaseNeeded; 
                        
                        let targetExam = 0;
                        if (mod.cc !== null && mod.cc !== "") {
                            targetExam = (targetModAvg * 2) - parseFloat(mod.cc);
                        } else {
                            targetExam = targetModAvg;
                        }

                        if (targetExam <= 20) {
                            estimationHtml = `<div class="text-[8px] md:text-[10px] text-yellow-300 font-bold mt-1 md:mt-2 text-center bg-yellow-900/40 rounded-md p-0.5 md:p-1.5 border border-yellow-700/50 shadow-sm leading-tight" title="Obtiens cette note pour valider TOUTE l'année !">🌟 Vise <br class="md:hidden"><strong>${targetExam.toFixed(2)}</strong></div>`;
                        } else {
                            estimationHtml = `<div class="text-[8px] md:text-[10px] text-rose-400 font-bold mt-1 md:mt-2 text-center bg-rose-900/20 rounded-md p-0.5 md:p-1.5 border border-rose-800/50 opacity-80 leading-tight">Impos. <br class="md:hidden">(>20)</div>`;
                        }
                    }

                    unitHtml += `
                        <tr class="border-b border-zinc-800/50 hover:bg-zinc-800/80 transition-colors">
                            <td class="p-0.5 md:p-2">
                                <div class="flex items-center gap-0.5 md:gap-2">
                                    <button onclick="deleteModule(${uIdx}, ${mIdx})" class="text-zinc-600 hover:text-red-400 text-xs md:text-lg p-1.5 md:p-1" title="Supprimer module">✖</button>
                                    <input type="text" value="${mod.name}" class="font-bold text-zinc-100 bg-transparent outline-none w-full min-w-[70px] border-b border-transparent focus:border-yellow-400 text-[10px] md:text-base leading-tight" onchange="updateModField(${uIdx}, ${mIdx}, 'name', this.value)">
                                </div>
                            </td>
                            <td class="p-0.5 md:p-2 text-center"><input type="number" min="1" value="${mod.coef}" class="cute-input grade-input mx-auto text-[16px] md:text-sm p-0.5 md:p-1.5 w-8 md:w-14" onchange="updateModField(${uIdx}, ${mIdx}, 'coef', this.value)"></td>
                            <td class="p-0.5 md:p-2 text-center"><input type="number" min="0" max="20" step="0.25" value="${mod.cc !== null ? mod.cc : ''}" placeholder="-" class="cute-input grade-input mx-auto text-[16px] md:text-sm p-0.5 md:p-1.5 w-10 md:w-16" onchange="updateModField(${uIdx}, ${mIdx}, 'cc', this.value)"></td>
                            <td class="p-0.5 md:p-2 text-center"><input type="number" min="0" max="20" step="0.25" value="${mod.exam !== null ? mod.exam : ''}" placeholder="-" class="cute-input grade-input mx-auto text-[16px] md:text-sm p-0.5 md:p-1.5 w-10 md:w-16 ${mod.rattrapage !== null && mod.rattrapage !== '' ? 'opacity-40 line-through' : ''}" onchange="updateModField(${uIdx}, ${mIdx}, 'exam', this.value)"></td>
                            <td class="p-0.5 md:p-2 text-center align-top bg-yellow-900/10">
                                <div class="flex flex-col justify-center h-full">
                                    ${rattrapageHtml}
                                    ${estimationHtml}
                                </div>
                            </td>
                            <td class="p-0.5 md:p-2 text-center font-black text-[11px] md:text-lg ${isModAcquired ? 'text-emerald-400' : 'text-yellow-500'}">${modAvg.toFixed(2)}</td>
                            <td class="p-1 md:p-2 text-center hidden md:table-cell">${statusHtml}</td>
                        </tr>
                    `;
                });

                unitHtml += `
                                </tbody>
                            </table>
                        </div>
                        <div class="mt-3 md:mt-4 flex justify-end">
                            <button onclick="addModule(${uIdx})" class="text-xs md:text-sm font-bold text-yellow-500 hover:text-zinc-900 hover:bg-yellow-400 bg-yellow-400/10 px-3 md:px-4 py-1.5 md:py-2 rounded-xl border border-yellow-400/30 transition-colors">+ Ajouter un module ici</button>
                        </div>
                    </div>
                `;
                
                container.innerHTML += unitHtml;
            });
        };

        window.updateGrade = (uIdx, mIdx, field, inputEl) => {
            let val = inputEl.value;
            let numVal = val === "" ? null : parseFloat(val);
            
            let oldVal = state.units[uIdx].modules[mIdx][field];
            state.units[uIdx].modules[mIdx][field] = numVal;

            if (numVal !== null && (oldVal === null || numVal > oldVal)) {
                spawnReaction(inputEl);
            }

            renderUnits();
        }

        window.updateModField = (uIdx, mIdx, field, val) => {
            let parsedVal = val === "" ? null : (field === 'coef' ? parseFloat(val) || 1 : (field === 'name' ? val : parseFloat(val)));
            state.units[uIdx].modules[mIdx][field] = parsedVal;
            renderUnits();
        }

        window.updateUnitName = (uIdx, val) => {
            state.units[uIdx].name = val;
            renderUnits();
        }

        window.addUnit = () => {
            state.units.push({
                id: "u" + Date.now(), name: "Nouveau Semestre",
                modules: [{ id: "m" + Date.now(), name: "Nouveau Module", coef: 1, cc: null, exam: null, rattrapage: null }]
            });
            renderUnits();
        }

        window.addModule = (uIdx) => {
            state.units[uIdx].modules.push({ id: "m" + Date.now(), name: "Module", coef: 1, cc: null, exam: null, rattrapage: null });
            renderUnits();
        }

        window.deleteUnit = (uIdx) => {
            showConfirm("Supprimer tout ce semestre ?", () => {
                state.units.splice(uIdx, 1);
                renderUnits();
            });
        }

        window.deleteModule = (uIdx, mIdx) => {
            showConfirm("Supprimer ce module ?", () => {
                state.units[uIdx].modules.splice(mIdx, 1);
                if(state.units[uIdx].modules.length === 0) state.units.splice(uIdx, 1);
                renderUnits();
            });
        }

        const emojis = ['🍌', '✨', '💛', '🌙', '⚡'];
        function spawnReaction(element) {
            const rect = element.getBoundingClientRect();
            for(let i=0; i<4; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                particle.style.left = (rect.left + (Math.random() * rect.width) - 10) + 'px';
                particle.style.top = (rect.top - 20) + 'px';
                particle.style.animationDuration = (Math.random() * 0.8 + 1) + 's';
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 2000);
            }
        }

        const arabicDuaas = [
            "اللهم لا سهل إلا ما جعلته سهلاً، وأنت تجعل الحزن إذا شئت سهلاً 🤲",
            "رب اشرح لي صدري ويسر لي أمري 🍌",
            "اللهم افتح عليّ فتوح العارفين بحكمتك ✨",
            "ربي يسر ولا تعسر، ربي أتمم بالخير 💛",
            "اللهم إني أستودعك ما قرأت وما حفظت فرده عند حاجتي إليه 📚",
            "اللهم ارزقني قوة الحفظ وسرعة الفهم وصفاء الذهن 🌟",
            "توكلت على الله ولا حول ولا قوة إلا بالله 🤍"
        ];

        function rotateDuaa() {
            const duaaEl = document.getElementById('arabic-duaa-container');
            if(!duaaEl) return;
            
            duaaEl.style.opacity = '0';
            
            setTimeout(() => {
                duaaEl.innerText = arabicDuaas[Math.floor(Math.random() * arabicDuaas.length)];
                duaaEl.style.opacity = '1';
            }, 700);
        }

        setInterval(rotateDuaa, 6000);

        window.onload = () => {
            document.getElementById('onboarding').classList.remove('hidden');
            rotateDuaa();
        };

    </script>
</body>
</html>
