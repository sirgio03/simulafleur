    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
        
        // Initialiser le thème (Sauvegarde le choix de l'utilisateur)
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    
    <style>
        body {
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* Mode Sombre */
        .dark body { background: linear-gradient(135deg, #09090b 0%, #18181b 100%); color: #f4f4f5; }
        .dark .glass-panel { background: rgba(24, 24, 27, 0.85); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); }
        .dark .cute-input { background: #27272a; border-color: #3f3f46; color: #f4f4f5; }
        .dark .cute-input:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        
        /* Mode Clair */
        body { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); color: #0f172a; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0, 0, 0, 0.05); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05); backdrop-filter: blur(12px); border-radius: 24px; position: relative; z-index: 10; }
        .cute-input { width: 100%; padding: 8px 12px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 0.95rem; font-weight: 800; background: #f8fafc; color: #0f172a; outline: none; transition: all 0.3s ease; }
        .cute-input:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); transform: scale(1.02); }
        
        /* Optimisations pour Mobile */
        @media (max-width: 768px) {
            .cute-input { font-size: 16px !important; }
            input[type="number"]::-webkit-inner-spin-button, 
            input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
            input[type="number"] { -moz-appearance: textfield; }
        }

        .grade-input { text-align: center; }

        /* Boutons */
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border: none; padding: 12px 24px; border-radius: 16px; font-weight: 900; font-size: 1.1rem; cursor: pointer; box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(59, 130, 246, 0.4); }
        .btn-primary:active { transform: translateY(1px); }

        .btn-outline { background: transparent; border: 2px solid #3b82f6; color: #3b82f6; padding: 8px 16px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: all 0.2s; }
        .btn-outline:hover { background: #3b82f6; color: white; }

        /* Animation Logo Éducation */
        .edu-logo { animation: floatLogo 4s ease-in-out infinite; }
        @keyframes floatLogo {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Particules et Réactions */
        .particle { position: absolute; font-size: 1.5rem; opacity: 0.8; animation: floatUp linear forwards; pointer-events: none; z-index: 50; }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.5) rotate(360deg); opacity: 0; }
        }

        .pop-reaction { position: absolute; font-size: 2rem; pointer-events: none; z-index: 100; animation: popUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popUp {
            0% { transform: scale(0.5) translateY(0); opacity: 1; }
            50% { transform: scale(1.5) translateY(-40px); opacity: 1; }
            100% { transform: scale(1) translateY(-80px); opacity: 0; }
        }

        /* Graduation Celebration */
        .falling-confetti { position: fixed; top: -10vh; font-size: 2rem; z-index: 9999; animation: fall linear forwards; pointer-events: none; }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* Barre de Progression Crédits */
        .progress-track { background: #e2e8f0; border-radius: 20px; height: 16px; width: 100%; overflow: hidden; position: relative; }
        .dark .progress-track { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #10b981); border-radius: 20px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .marker-45 { position: absolute; top: 0; left: 75%; width: 4px; height: 100%; background: #eab308; z-index: 10; box-shadow: 0 0 10px #eab308; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; padding: 1rem; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--card-bg); padding: 24px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); transform: translateY(20px); transition: transform 0.3s; text-align: center; max-width: 100%; width: 360px; border: 2px solid #3b82f6; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .dark .modal-content { background: #18181b; }
        .modal-content:not(.dark) { background: #ffffff; }

        .shining-line { position: absolute; width: 100%; height: 4px; border-radius: 4px; background: linear-gradient(90deg, #10b981 0%, #fde047 30%, #10b981 60%, #fde047 100%); background-size: 200% auto; animation: shine 3s linear infinite; box-shadow: 0 0 15px rgba(16, 185, 129, 0.6), 0 0 25px rgba(253, 224, 71, 0.4); }
        @keyframes shine { to { background-position: 200% center; } }
        .shining-badge { position: relative; z-index: 1; padding: 0.5rem 2rem; border-radius: 9999px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; border: 2px solid #fde047; box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); transition: all 0.3s; }
        .dark .shining-badge { background: #022c22; color: #fde047; }
        body:not(.dark) .shining-badge { background: #ecfdf5; color: #065f46; }
    </style>

        function getModAvg(mod) {
            let initialExam = parseFloat(mod.exam || 0);
            let finalExam = mod.rattrapage !== null && mod.rattrapage !== "" ? parseFloat(mod.rattrapage) : initialExam;
            
            let initialAvg = initialExam;
            let finalAvg = finalExam;

            if (mod.cc !== null && mod.cc !== "") {
                initialAvg = (parseFloat(mod.cc) + initialExam) / 2;
                finalAvg = (parseFloat(mod.cc) + finalExam) / 2;
            }
            
            return {
                initial: initialAvg,
                final: finalAvg,
                isInitialAcquired: initialAvg >= 10.0
            };
        }

        function getUnitStats(unit) {
            let pts = 0, initialPts = 0, coefs = 0, earnedCredits = 0;
            
            unit.modules.forEach(mod => {
                let c = parseFloat(mod.coef || 0);
                let avgs = getModAvg(mod);
                
                pts += avgs.final * c;
                initialPts += avgs.initial * c;
                coefs += c;
                
                if (avgs.final >= 10.0) {
                    earnedCredits += parseFloat(mod.cred || 0);
                }
            });
            
            let avg = coefs > 0 ? (pts / coefs) : 0;
            let initialAvg = coefs > 0 ? (initialPts / coefs) : 0;
            let isAcquired = avg >= 10.0;
            
            let finalCredits = isAcquired ? unit.creditsTarget : earnedCredits;

            return { avg, initialAvg, pts, coefs, isAcquired, credits: finalCredits };
        }

                globalInitialPts += uStats.initialPts;
                globalCoefs += uStats.coefs;
                totalCredits += uStats.credits;
                
                if (unit.semester === 1) { s1Pts += uStats.pts; s1Coefs += uStats.coefs; }
                else if (unit.semester === 2) { s2Pts += uStats.pts; s2Coefs += uStats.coefs; }
                
                return uStats;

                                    </tr>
                                </thead>

                `;

                    const isModAcquiredInitial = avgs.isInitialAcquired;

                    const isFieldLocked = isUnitLocked || isModAcquiredInitial;

                    if (isYearAcquiredInitial) {
                        rattrapageHtml = `<span class="text-xs text-emerald-500 font-bold bg-emerald-500/10 px-2 py-1 rounded-md border border-emerald-500/30">Année 🔒</span>`;
                    } else if (isSemesterAcquiredInit) {
                        rattrapageHtml = `<span class="text-xs text-emerald-500 font-bold bg-emerald-500/10 px-2 py-1 rounded-md border border-emerald-500/30">Semestre 🔒</span>`;
                    } else if (uStats.initialAvg >= 10.0) {

                        // Libre de repasser
                        rattrapageHtml = `<input type="number" min="0" max="20" step="0.25" value="${mod.rattrapage !== null ? mod.rattrapage : ''}" placeholder="?" class="cute-input grade-input mx-auto border-blue-400 focus:border-blue-600 w-16 text-xs p-1" onchange="updateGrade(${uIdx}, ${mIdx}, 'rattrapage', this)">`;
                        
                        // ROI & Estimation pour valider l'année
                        if (globalDeficit > 0 && parseFloat(mod.coef) > 0) {

                            if (mod.cc !== null && mod.cc !== "") { targetExam = (targetModAvg * 2) - parseFloat(mod.cc); }

                container.innerHTML += unitHtml;

        window.updateGrade = (uIdx, mIdx, field, inputEl) => {
            let val = inputEl.value;

            let oldVal = state.units[uIdx].modules[mIdx][field];
            state.units[uIdx].modules[mIdx][field] = numVal;

            if (numVal !== null && (oldVal === null || numVal > oldVal)) {
                spawnReaction(inputEl);
            }
            renderUnits();
        }

        window.updateModField = (uIdx, mIdx, field, val) => {
            let parsedVal = val === "" ? null : (['coef', 'cred'].includes(field) ? parseFloat(val) || 0 : (field === 'name' ? val : parseFloat(val)));
            state.units[uIdx].modules[mIdx][field] = parsedVal;
            renderUnits();
        }

            state.units[uIdx][field] = val;

            });
            renderUnits();
        }

            for(let i=0; i<4; i++) {
                const particle = document.createElement('div');
                particle.className = 'pop-reaction';
                particle.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                particle.style.left = (rect.left + (Math.random() * rect.width) - 10) + 'px';
                particle.style.top = (rect.top - 20) + 'px';
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);

                conf.style.animationDuration = (Math.random() * 2 + 2) + 's';

                setTimeout(() => conf.remove(), 4000);

            "رب اشرح لي صدري ويسر لي أمري ✨",
            "اللهم افتح عليّ فتوح العارفين 🎓",
            "ربي يسر ولا تعسر 💙",
            "اللهم ارزقني قوة الحفظ وسرعة الفهم 🌟"
        ];

        function rotateDuaa() {
            const duaaEl = document.getElementById('arabic-duaa-container');
            if(!duaaEl) return;
            duaaEl.style.opacity = '0';
            setTimeout(() => {
                duaaEl.innerText = arabicDuaas[Math.floor(Math.random() * arabicDuaas.length)];
                duaaEl.style.opacity = '1';
            }, 700);
        }

        setInterval(rotateDuaa, 6000);

        window.onload = () => {
            document.getElementById('onboarding').classList.remove('hidden');
            rotateDuaa();
        };
    </script>
</body>
</html>
